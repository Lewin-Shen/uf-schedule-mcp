name: Release

# Builds the .mcpb desktop bundle and attaches it to the GitHub Release.
on:
  release:
    types: [published]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run bundle
      - name: Attach uf-schedule-mcp.mcpb to the release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: uf-schedule-mcp.mcpb
      - name: Upload bundle as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: uf-schedule-mcp-mcpb
          path: uf-schedule-mcp.mcpb
